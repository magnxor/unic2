<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 533" width="400" height="533">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F4EE"/>
      <stop offset="100%" style="stop-color:#EDE5D8"/>
    </linearGradient>
    <linearGradient id="skin8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE8C8"/>
      <stop offset="100%" style="stop-color:#E8C090"/>
    </linearGradient>
    <linearGradient id="hair8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A050"/>
      <stop offset="100%" style="stop-color:#A07030"/>
    </linearGradient>
    <linearGradient id="tooth8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F3EE"/>
    </linearGradient>
    <radialGradient id="blush8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F0A898;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F0A898;stop-opacity:0"/>
