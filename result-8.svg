  <text x="200" y="486" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#B8975A" letter-spacing="3">CLAREAMENTO A LASER</text>
  <text x="200" y="508" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7B7368">Resultado final · Unic Clinic</text>

