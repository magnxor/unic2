  <circle cx="180" cy="402" r="3" fill="#F0EAE0" opacity="0.9"/>
  <circle cx="200" cy="408" r="4" fill="#F0EAE0" opacity="0.95"/>
  <circle cx="220" cy="402" r="3" fill="#F0EAE0" opacity="0.9"/>

