  <line x1="115" y1="274" x2="115" y2="254" stroke="#C9A96E" stroke-width="1.2" opacity="0.5"/>
  <line x1="108" y1="270" x2="128" y2="270" stroke="#C9A96E" stroke-width="1.2" opacity="0.5"/>
