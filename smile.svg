<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg-smile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1410"/>
      <stop offset="100%" style="stop-color:#2D2218"/>
    </linearGradient>
    <linearGradient id="tooth-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF8"/>
      <stop offset="100%" style="stop-color:#E8E4DC"/>
    </linearGradient>
    <radialGradient id="lips-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C47878"/>
      <stop offset="100%" style="stop-color:#A05050"/>
    </radialGradient>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FAFAF8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-smile)"/>

  <!-- Decorative ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.15"/>

  <!-- Gold dots on ring -->
  <circle cx="200" cy="30" r="3" fill="#C9A96E" opacity="0.6"/>
  <circle cx="200" cy="370" r="3" fill="#C9A96E" opacity="0.6"/>
  <circle cx="30" cy="200" r="3" fill="#C9A96E" opacity="0.6"/>
  <circle cx="370" cy="200" r="3" fill="#C9A96E" opacity="0.6"/>

  <!-- Face outline (subtle) -->
  <ellipse cx="200" cy="195" rx="140" ry="155" fill="#221A12" opacity="0.5"/>

  <!-- Upper lip -->
  <path d="M 100 195 Q 130 175 165 185 Q 185 178 200 180 Q 215 178 235 185 Q 270 175 300 195 Q 270 190 245 192 Q 225 188 200 190 Q 175 188 155 192 Q 130 190 100 195 Z" fill="#B06060"/>

  <!-- Lower lip -->
  <path d="M 100 195 Q 140 235 200 248 Q 260 235 300 195 Q 260 215 230 218 Q 215 222 200 223 Q 185 222 170 218 Q 140 215 100 195 Z" fill="url(#lips-r)"/>

  <!-- Lip shine -->
  <path d="M 155 210 Q 200 218 245 210 Q 200 225 155 210 Z" fill="white" opacity="0.15"/>

  <!-- Teeth area background -->
  <path d="M 105 197 Q 145 230 200 240 Q 255 230 295 197 Q 255 205 228 207 Q 215 208 200 208 Q 185 208 172 207 Q 145 205 105 197 Z" fill="#F0EDE5"/>

  <!-- Individual teeth -->
  <!-- Center left incisor -->
  <path d="M 185 193 L 183 232 Q 187 238 193 238 Q 198 238 199 232 L 200 193 Z" fill="url(#tooth-g)" rx="2"/>
  <path d="M 185 193 L 183 232 Q 187 238 193 238 Q 198 238 199 232 L 200 193 Z" fill="url(#shine)" opacity="0.6"/>

  <!-- Center right incisor -->
  <path d="M 201 193 L 201 232 Q 202 238 207 238 Q 213 238 217 232 L 215 193 Z" fill="url(#tooth-g)"/>
  <path d="M 201 193 L 201 232 Q 202 238 207 238 Q 213 238 217 232 L 215 193 Z" fill="url(#shine)" opacity="0.6"/>

  <!-- Left lateral incisor -->
  <path d="M 170 195 L 167 228 Q 171 235 177 235 Q 182 235 184 228 L 184 193 Z" fill="url(#tooth-g)"/>
  <path d="M 170 195 L 167 228 Q 171 235 177 235 Q 182 235 184 228 L 184 193 Z" fill="url(#shine)" opacity="0.4"/>

  <!-- Right lateral incisor -->
  <path d="M 216 193 L 216 228 Q 218 235 223 235 Q 229 235 230 228 L 230 195 Z" fill="url(#tooth-g)"/>
  <path d="M 216 193 L 216 228 Q 218 235 223 235 Q 229 235 230 228 L 230 195 Z" fill="url(#shine)" opacity="0.4"/>

  <!-- Left canine -->
  <path d="M 152 198 L 148 222 Q 152 230 158 228 Q 164 226 166 219 L 169 196 Z" fill="url(#tooth-g)"/>

  <!-- Right canine -->
  <path d="M 231 196 L 234 219 Q 236 226 242 228 Q 248 230 252 222 L 248 198 Z" fill="url(#tooth-g)"/>

  <!-- Left premolar (partial) -->
  <path d="M 134 204 L 130 218 Q 134 226 140 224 Q 146 222 148 215 L 151 199 Z" fill="url(#tooth-g)" opacity="0.8"/>

  <!-- Right premolar (partial) -->
  <path d="M 249 199 L 252 215 Q 254 222 260 224 Q 266 226 270 218 L 266 204 Z" fill="url(#tooth-g)" opacity="0.8"/>

  <!-- Tooth divider lines -->
  <line x1="200" y1="193" x2="200" y2="237" stroke="#D8D4CC" stroke-width="1" opacity="0.7"/>
  <line x1="184" y1="193" x2="183" y2="234" stroke="#D8D4CC" stroke-width="0.8" opacity="0.5"/>
  <line x1="216" y1="193" x2="216" y2="234" stroke="#D8D4CC" stroke-width="0.8" opacity="0.5"/>
  <line x1="169" y1="196" x2="167" y2="228" stroke="#D8D4CC" stroke-width="0.8" opacity="0.4"/>
  <line x1="231" y1="196" x2="232" y2="228" stroke="#D8D4CC" stroke-width="0.8" opacity="0.4"/>

  <!-- Gold sparkle accents -->
  <g opacity="0.8">
    <polygon points="75,80 79,92 91,92 81,100 85,112 75,104 65,112 69,100 59,92 71,92" fill="#C9A96E" opacity="0.7" transform="scale(0.6) translate(50,60)"/>
    <polygon points="330,60 333,70 343,70 335,76 338,86 330,80 322,86 325,76 317,70 327,70" fill="#C9A96E" opacity="0.5" transform="scale(0.5) translate(340,50)"/>
    <polygon points="340,320 342,328 350,328 344,333 346,341 340,336 334,341 336,333 330,328 338,328" fill="#C9A96E" opacity="0.4" transform="scale(0.5) translate(350,300)"/>
    <polygon points="60,320 62,328 70,328 64,333 66,341 60,336 54,341 56,333 50,328 58,328" fill="#C9A96E" opacity="0.4" transform="scale(0.5) translate(50,300)"/>
  </g>

  <!-- Sparkle lines near teeth -->
  <line x1="310" y1="155" x2="330" y2="145" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="160" x2="320" y2="140" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
  <line x1="315" y1="150" x2="335" y2="155" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>

  <!-- Label at bottom -->
  <text x="200" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C9A96E" opacity="0.45" letter-spacing="5">SORRISO PERFEITO</text>
</svg>
